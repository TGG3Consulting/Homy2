# ============================================
# Homy Development Docker Compose
# For local development with hot-reload
# ============================================
# Usage: docker compose up -d

name: homy-dev

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: homy-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-homy_dev}
    ports:
      # Bind to loopback only — DB must not be reachable from other hosts (VULN-022).
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homy} -d ${POSTGRES_DB:-homy_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - homy-network

  # Redis Cache (optional for development)
  redis:
    image: redis:7-alpine
    container_name: homy-redis-dev
    restart: unless-stopped
    ports:
      # Bind to loopback only — Redis has no auth here, so never expose it (VULN-023).
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-homy_dev_redis}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homy-network

  # Adminer - Database Management UI
  adminer:
    image: adminer:latest
    container_name: homy-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: nette
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homy-network

  # Mailhog - Email Testing (catches all outgoing emails)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: homy-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - homy-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  homy-network:
    driver: bridge
